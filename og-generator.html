<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>Formvo OG Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      position: relative;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(67, 97, 238, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(67, 97, 238, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 100%);
      pointer-events: none;
    }

    /* Glow */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(67, 97, 238, 0.2) 0%, rgba(114, 9, 183, 0.08) 40%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 60px;
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, #ffffff 0%, #93a8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 28px;
      color: #c8d6e5;
      font-weight: 400;
      line-height: 1.5;
      max-width: 700px;
    }

    .tagline strong {
      color: #dce6f0;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 100px;
      background: rgba(67, 97, 238, 0.1);
      border: 1px solid rgba(67, 97, 238, 0.25);
      color: #6b83f5;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 32px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b83f5;
    }

    .url {
      position: absolute;
      bottom: 40px;
      color: #64748b;
      font-size: 18px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="brand">Formvo</div>
    <p class="tagline">AI-powered conversational forms that convert.<br><strong>Describe it. Share it. Collect better data.</strong></p>
    <div class="badge">
      <span class="badge-dot"></span>
      Coming Soon
    </div>
    <div class="url">formvo.app</div>
  </div>
</body>
</html>
