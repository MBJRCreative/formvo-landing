  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-light: #111118;
      --sapphire: #4361ee;
      --sapphire-glow: #6b83f5;
      --sapphire-bright: #93a8f9;
      --pink: #f72585;
      --indigo: #7209b7;
      --aqua: #4cc9f0;
      --white: #f1f1f3;
      --gray: #94a3b8;
      --gray-dim: #64748b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(67, 97, 238, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(67, 97, 238, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 20%, transparent 100%);
      pointer-events: none;
    }

    /* Primary glow — sapphire/pink gradient */
    .glow-bg {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(67, 97, 238, 0.25) 0%, rgba(114, 9, 183, 0.1) 40%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -65%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    /* Secondary glow — pink accent */
    .glow-bg-secondary {
      position: absolute;
      width: 500px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(247, 37, 133, 0.06) 0%, transparent 70%);
      top: 58%;
      left: 50%;
      transform: translate(-50%, 0);
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -65%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -65%) scale(1.06); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 620px;
      animation: fadeUp 1s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-container {
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: center;
      animation: fadeUp 0.8s ease-out both;
    }

    .formvo-logo {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 30px rgba(67, 97, 238, 0.5)) drop-shadow(0 0 60px rgba(114, 9, 183, 0.2));
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(180deg, #ffffff 0%, var(--sapphire-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1s 0.15s ease-out both;
    }

    .tagline {
      font-size: 1.2rem;
      color: #c8d6e5;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 1.75rem;
      animation: fadeUp 1s 0.3s ease-out both;
    }

    .tagline strong {
      color: #dce6f0;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      border-radius: 100px;
      background: rgba(67, 97, 238, 0.1);
      border: 1px solid rgba(67, 97, 238, 0.25);
      color: var(--sapphire-glow);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.75rem;
      animation: fadeUp 1s 0.45s ease-out both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sapphire-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* CTA button */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #4361ee 0%, #7209b7 50%, #f72585 100%);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-bottom: 2rem;
      animation: fadeUp 1s 0.5s ease-out both;
    }

    .cta-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(67, 97, 238, 0.3);
    }

    .cta-btn svg {
      width: 18px;
      height: 18px;
    }

    .features {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      animation: fadeUp 1s 0.6s ease-out both;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(67, 97, 238, 0.3), transparent);
      margin: 0 auto 2rem;
      animation: fadeUp 1s 0.7s ease-out both;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-dim);
      font-size: 0.85rem;
    }

    .feature svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .feature .icon-sapphire { color: var(--sapphire); }
    .feature .icon-indigo { color: var(--indigo); }
    .feature .icon-pink { color: var(--pink); }

    /* Trust row */
    .trust-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      animation: fadeUp 1s 0.75s ease-out both;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--gray);
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      background: rgba(148, 163, 184, 0.04);
    }

    .trust-item svg {
      width: 13px;
      height: 13px;
      color: var(--aqua);
      flex-shrink: 0;
      opacity: 0.7;
    }

    footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      text-align: center;
      z-index: 1;
    }

    footer a {
      color: var(--gray-dim);
      text-decoration: none;
      font-size: 0.75rem;
      margin: 0 1rem;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--white); }

    @media (max-width: 480px) {
      .brand { font-size: 2.5rem; }
      .tagline { font-size: 1.05rem; }
      .features { flex-direction: column; align-items: center; gap: 1rem; }
      .trust-row { flex-direction: column; gap: 0.75rem; }
      .formvo-logo { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="glow-bg-secondary"></div>

  <div class="container">

    </div>

    </button>

    <div class="features">

      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        No Credit Card Required
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Built with AI
      </div>
    </div>
  </div>

  <footer>
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
    <p style="color: var(--gray-dim); font-size: 0.7rem; margin-top: 0.75rem; opacity: 0.7;">&copy; 2026 MBJR Creative, LLC</p>
  </footer>

  <!-- Formvo Widget — eating our own dogfood -->
  <script src="https://formvo.app/widget.js" data-form="7b1d1963-e5b7-4180-9fad-151e860e7e69" data-position="bottom-right" async></script>
  <script>
    function openFormvoWidget() {
      const trigger = document.querySelector('.formvo-trigger');
      if (trigger) {
        trigger.click();
      } else {
        // Widget hasn't loaded yet — fallback: open in new tab
        window.open('https://formvo.app', '_blank');
      }
    }
  </script>
