  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-light: #111118;
      --sapphire: #4361ee;
      --sapphire-glow: #6b83f5;
      --sapphire-bright: #93a8f9;
      --pink: #f72585;
      --indigo: #7209b7;
      --aqua: #4cc9f0;
      --white: #f1f1f3;
      --gray: #94a3b8;
      --gray-dim: #64748b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(67, 97, 238, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(67, 97, 238, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 20%, transparent 100%);
      pointer-events: none;
    }

    /* Primary glow — sapphire/pink gradient */
    .glow-bg {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(67, 97, 238, 0.25) 0%, rgba(114, 9, 183, 0.1) 40%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -65%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    /* Secondary glow — pink accent */
    .glow-bg-secondary {
      position: absolute;
      width: 500px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(247, 37, 133, 0.06) 0%, transparent 70%);
      top: 58%;
      left: 50%;
      transform: translate(-50%, 0);
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -65%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -65%) scale(1.06); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 620px;
      animation: fadeUp 1s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-container {
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: center;
      animation: fadeUp 0.8s ease-out both;
    }

    .formvo-logo {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 0 24px rgba(67, 97, 238, 0.45)) drop-shadow(0 0 48px rgba(114, 9, 183, 0.2));
      animation: fadeUp 0.8s ease-out both, logoFloat 4s ease-in-out 1.5s infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ─── Chatbot comes alive ─── */

    /* Eyes blink every 4s */
    .eye-left, .eye-right {
      animation: eyeBlink 4s ease-in-out 2s infinite;
      transform-origin: center;
    }
    .eye-right { animation-delay: 2.1s; }

    @keyframes eyeBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* Antenna ball pulses */
    .antenna-ball {
      animation: antennaPulse 2s ease-in-out 1.5s infinite;
      transform-origin: center;
    }

    @keyframes antennaPulse {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 0px rgba(76, 201, 240, 0)); }
      50% { opacity: 1; filter: drop-shadow(0 0 8px rgba(76, 201, 240, 0.6)); }
    }

    /* Speech bubble text lines type in */
    .speech-line-1 {
      animation: fadeUp 0.8s ease-out both, typeIn 0.6s ease-out 1.2s both;
    }
    .speech-line-2 {
      animation: fadeUp 0.8s ease-out both, typeIn 0.6s ease-out 1.6s both;
    }

    @keyframes typeIn {
      from { clip-path: inset(0 100% 0 0); opacity: 0.3; }
      to { clip-path: inset(0 0% 0 0); opacity: 1; }
    }

    /* Ears wiggle subtly */
    .ear-left {
      animation: earWiggleL 5s ease-in-out 2s infinite;
      transform-origin: right center;
    }
    .ear-right {
      animation: earWiggleR 5s ease-in-out 2.5s infinite;
      transform-origin: left center;
    }

    @keyframes earWiggleL {
      0%, 85%, 100% { transform: rotate(0deg); }
      90% { transform: rotate(-3deg); }
      95% { transform: rotate(1deg); }
    }
    @keyframes earWiggleR {
      0%, 85%, 100% { transform: rotate(0deg); }
      90% { transform: rotate(3deg); }
      95% { transform: rotate(-1deg); }
    }

    /* Smile widens on hover */
    .smile {
      transition: transform 0.3s ease;
      transform-origin: center;
    }
    .formvo-logo:hover .smile {
      transform: scaleX(1.15) scaleY(1.1);
    }
    .formvo-logo:hover .eye-left,
    .formvo-logo:hover .eye-right {
      animation: none;
      transform: scaleY(0.7);
      transition: transform 0.2s ease;
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(180deg, #ffffff 0%, var(--sapphire-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1s 0.15s ease-out both;
    }

    .tagline {
      font-size: 1.2rem;
      color: #c8d6e5;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 1.75rem;
      animation: fadeUp 1s 0.3s ease-out both;
    }

    .tagline strong {
      color: #dce6f0;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      border-radius: 100px;
      background: rgba(67, 97, 238, 0.1);
      border: 1px solid rgba(67, 97, 238, 0.25);
      color: var(--sapphire-glow);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.75rem;
      animation: fadeUp 1s 0.45s ease-out both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sapphire-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    footer {
      width: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
      z-index: 1;
      margin-top: 0;
    }

    footer a {
      color: var(--gray-dim);
      text-decoration: none;
      font-size: 0.75rem;
      margin: 0 1rem;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--white); }

    @media (max-width: 480px) {
      .brand { font-size: 2.5rem; }
      .tagline { font-size: 1.05rem; }
      .formvo-logo { width: 90px; height: 90px; }
}
  </style>
</head>
